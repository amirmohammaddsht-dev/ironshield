name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "ironshield/**"
  pull_request:
    paths:
      - "docs/**"

jobs:
  validate_docs:
    name: Validate Documentation
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Check FA/EN doc parity
        run: |
          python3 << 'EOF'
          from pathlib import Path

          fa_dir = Path("docs/fa")
          en_dir = Path("docs/en")

          if not fa_dir.exists() or not en_dir.exists():
              print("⚠️  docs/fa or docs/en directory not found yet — skipping parity check")
              exit(0)

          fa_files = {f.name for f in fa_dir.glob("*.md")}
          en_files = {f.name for f in en_dir.glob("*.md")}

          missing_in_en = fa_files - en_files
          missing_in_fa = en_files - fa_files

          if missing_in_en:
              print(f"⚠️  Files in fa/ but missing in en/: {missing_in_en}")
          if missing_in_fa:
              print(f"⚠️  Files in en/ but missing in fa/: {missing_in_fa}")

          if not missing_in_en and not missing_in_fa:
              print("✅ FA/EN documentation parity OK")
          EOF

      - name: Check for broken internal links
        run: |
          python3 << 'EOF'
          import re
          from pathlib import Path

          errors = []
          for md_file in Path(".").rglob("*.md"):
              if "node_modules" in str(md_file):
                  continue
              content = md_file.read_text(errors="ignore")
              links = re.findall(r"\[.*?\]\(((?!http)[^)]+)\)", content)
              for link in links:
                  link = link.split("#")[0]  # strip anchor
                  if not link or link.startswith("mailto:"):
                      continue
                  target = (md_file.parent / link).resolve()
                  if not target.exists():
                      errors.append(f"{md_file}: broken link → {link}")

          if errors:
              print("⚠️  Broken internal links found:")
              for e in errors:
                  print(f"  - {e}")
          else:
              print("✅ No broken internal links found")
          EOF
