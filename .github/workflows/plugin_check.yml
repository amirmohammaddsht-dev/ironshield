name: Plugin Validation

on:
  push:
    paths:
      - "plugins/**"
  pull_request:
    paths:
      - "plugins/**"
  schedule:
    - cron: "0 6 * * *"  # Daily at 06:00 UTC — check for plugin updates
  workflow_dispatch:

jobs:
  validate_plugins:
    name: Validate Plugin Structure
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyyaml

      - name: Validate plugin.yaml files
        run: |
          python3 << 'EOF'
          import yaml
          import sys
          from pathlib import Path

          REQUIRED_FIELDS = ["name", "display_name", "version", "author", "license", "roles", "category", "priority"]
          REQUIRED_FILES = ["plugin.yaml", "install.sh", "uninstall.sh", "update.sh", "service.py"]

          errors = []
          plugins_root = Path("plugins")

          for plugin_yaml in plugins_root.rglob("plugin.yaml"):
              plugin_dir = plugin_yaml.parent
              plugin_name = plugin_dir.name

              # Check required files
              for fname in REQUIRED_FILES:
                  if not (plugin_dir / fname).exists():
                      errors.append(f"{plugin_name}: missing {fname}")

              # Parse and validate YAML
              try:
                  with open(plugin_yaml) as f:
                      data = yaml.safe_load(f)
              except Exception as e:
                  errors.append(f"{plugin_name}: invalid YAML — {e}")
                  continue

              for field in REQUIRED_FIELDS:
                  if field not in data:
                      errors.append(f"{plugin_name}: missing field '{field}'")

              # Validate roles
              valid_roles = {"iran", "foreign", "both"}
              roles = data.get("roles", [])
              for role in roles:
                  if role not in valid_roles:
                      errors.append(f"{plugin_name}: invalid role '{role}'")

              # Validate category
              valid_categories = {
                  "vpn", "tunnel_fast", "tunnel_reliable",
                  "tunnel_obfuscated", "dns", "emergency"
              }
              category = data.get("category", "")
              if category not in valid_categories:
                  errors.append(f"{plugin_name}: invalid category '{category}'")

              print(f"✓ {plugin_name}: {data.get('version', '?')}")

          if errors:
              print("\n❌ Validation errors:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          else:
              print("\n✅ All plugins validated successfully")
          EOF

      - name: ShellCheck plugin install scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./plugins"
          severity: error

      - name: Check Python service.py syntax
        run: |
          for f in plugins/*/*/service.py; do
            echo "Checking: $f"
            python3 -m py_compile "$f"
          done
          echo "✅ All service.py files compile successfully"

  check_plugin_updates:
    name: Check for Plugin Updates
    runs-on: ubuntu-22.04
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Check GitHub-sourced plugin versions
        id: check
        run: |
          python3 << 'EOF' > /tmp/updates.json
          import yaml
          import json
          import urllib.request
          from pathlib import Path

          updates = []

          for plugin_yaml in Path("plugins").rglob("plugin.yaml"):
              with open(plugin_yaml) as f:
                  data = yaml.safe_load(f)

              auto_update = data.get("auto_update", {})
              if auto_update.get("source_type") != "github_release":
                  continue

              repo = auto_update.get("repo")
              if not repo:
                  continue

              try:
                  url = f"https://api.github.com/repos/{repo}/releases/latest"
                  req = urllib.request.Request(url, headers={"Accept": "application/vnd.github.v3+json"})
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      release = json.loads(resp.read())
                      latest = release.get("tag_name", "").lstrip("v")
                      current = str(data.get("version", ""))
                      if latest and latest != current:
                          updates.append({
                              "name": data["name"],
                              "current": current,
                              "latest": latest,
                              "repo": repo,
                          })
              except Exception as e:
                  print(f"Could not check {repo}: {e}")

          json.dump(updates, open("/tmp/updates.json", "w"))
          print(json.dumps(updates, indent=2))
          EOF
          cat /tmp/updates.json

      - name: Create issue if updates available
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const updates = JSON.parse(fs.readFileSync('/tmp/updates.json', 'utf8'));

            if (updates.length === 0) {
              console.log('No plugin updates available');
              return;
            }

            const body = updates.map(u =>
              `- **${u.name}**: \`${u.current}\` → \`${u.latest}\` ([${u.repo}](https://github.com/${u.repo}))`
            ).join('\n');

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'plugin-update',
              state: 'open',
            });

            if (issues.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `## Plugin Updates Available\n\n${body}\n\n_Last checked: ${new Date().toISOString()}_`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Plugin Updates Available',
                body: `## Plugin Updates Available\n\n${body}\n\n_Last checked: ${new Date().toISOString()}_`,
                labels: ['plugin-update'],
              });
            }
